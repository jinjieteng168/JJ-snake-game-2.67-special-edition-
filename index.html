<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JJsnake game 2.67(special edition)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle, #251c4a 0%, #0e091a 100%);
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            width: 95vw;
            max-width: 800px;
            aspect-ratio: 4 / 3; 
        }
        canvas {
            display: block;
            background: #110e1c;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 20px; 
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">SCORE: <span id="score">000</span></div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        // --- Web Audio Code Generator (No external files needed!) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Funny synth sound when eating food
        function playEatSound() {
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'triangle'; // Smooth arcade sound
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                // Pitch slide up for funny jump effect
                osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.15);
                
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } catch(e) {}
        }

        // Derpy retro sound when game over
        function playGameOverSound() {
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sawtooth'; // Buzzing funny sound
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.5);
                
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } catch(e) {}
        }

        // --- Core Variables ---
        let snake = [
            {x: 400, y: 300},
            {x: 385, y: 300},
            {x: 370, y: 300},
            {x: 355, y: 300}
        ];
        
        let radius = 12;       
        let speed = 6;         
        let angle = 0;         
        let targetAngle = 0;   
        let score = 0;
        let isGameOver = false; 
        let growPending = 0;   
        let waveTimer = 0; // NEW: Used to animate the funny shaking/wobbling movement

        // Food Attributes
        let food = {
            x: 0,
            y: 0,
            radius: 16, 
            pulse: 1,
            type: '🍎'   
        };

        const foodPool = ['🍎', '🍌', '🍓', '🍩', '🍕', '🍇', '🍉', '🥑', '🍔', '🍟', '🍦', '🍰', '67']; // NEW: '67' added into food pool!

        function respawnFood() {
            food.x = Math.random() * (canvas.width - 100) + 50;
            food.y = Math.random() * (canvas.height - 100) + 50;
            food.type = foodPool[Math.floor(Math.random() * foodPool.length)];
        }

        respawnFood();

        // --- Core Logic: Update ---
        function update() {
            if (isGameOver) return; 

            // Increase shaking timer based on speed
            waveTimer += speed * 0.08;

            let angleDiff = targetAngle - angle;
            angleDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
            angle += angleDiff * 0.2; 

            let head = {
                x: snake[0].x + Math.cos(angle) * speed,
                y: snake[0].y + Math.sin(angle) * speed
            };

            // Wall Collision Check
            if (head.x > canvas.width || head.x < 0 || head.y > canvas.height || head.y < 0) {
                isGameOver = true;
                playGameOverSound(); // Trigger Game Over Sound
                return;
            }

            snake.unshift(head);

            // Food Collision Check
            let dx = head.x - food.x;
            let dy = head.y - food.y;
            let distance = Math.sqrt(dx * dx + dy * dy); 

            if (distance < radius + food.radius) {
                // If snake eats '67', give double bonus score for meme effect!
                if (food.type === '67') {
                    score += 67; 
                } else {
                    score += 10;
                }
                scoreEl.innerText = score.toString().padStart(3, '0');
                playEatSound(); // Trigger Arcade Sound
                respawnFood();
                speed += 0.15; 
                growPending += 3; 
            }

            if (growPending > 0) {
                growPending--; 
            } else {
                snake.pop(); 
            }

            // Self Collision Check
            for (let i = 15; i < snake.length; i++) {
                let sDx = head.x - snake[i].x;
                let sDy = head.y - snake[i].y;
                let sDist = Math.sqrt(sDx * sDx + sDy * sDy);
                if (sDist < radius * 0.8) {
                    isGameOver = true; 
                    playGameOverSound(); // Trigger Game Over Sound
                    return;
                }
            }

            food.pulse = 1 + Math.sin(Date.now() * 0.005) * 0.15;
        }

        function resetGame() {
            score = 0;
            speed = 6; 
            angle = 0;
            targetAngle = 0;
            isGameOver = false;
            growPending = 0; 
            waveTimer = 0;
            scoreEl.innerText = "000";
            snake = [
                {x: 400, y: 300},
                {x: 385, y: 300},
                {x: 370, y: 300},
                {x: 355, y: 300}
            ];
            respawnFood();
        }

        // --- Core Logic: Draw ---
        function draw() {
            ctx.fillStyle = '#110e1c'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Funny Wobbling Cartoon Snake
            snake.forEach((segment, index) => {
                ctx.beginPath();
                
                // NEW MEME EFFECT: Calculate a dynamic offset to make the body segments wobble like a spring
                // This creates a hilarious butt-shaking dance movement
                let wobbleX = Math.sin(waveTimer + index * 0.5) * 5 * Math.sin(angle);
                let wobbleY = Math.cos(waveTimer + index * 0.5) * 5 * Math.cos(angle);
                
                let renderX = segment.x + wobbleX;
                let renderY = segment.y + wobbleY;

                if (index === 0) {
                    // Head
                    ctx.arc(renderX, renderY, radius * 1.3, 0, Math.PI * 2); 
                    ctx.fillStyle = '#4caf50'; 
                    ctx.fill();

                    // Derpy Animated Eyes
                    let eyeOffsetAngle = 0.5; 
                    
                    // Left Eye
                    let leftEyeX = renderX + Math.cos(angle - eyeOffsetAngle) * 10;
                    let leftEyeY = renderY + Math.sin(angle - eyeOffsetAngle) * 10;
                    ctx.beginPath();
                    ctx.arc(leftEyeX, leftEyeY, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.beginPath(); 
                    ctx.arc(leftEyeX, leftEyeY, 3, 0, Math.PI * 2); // Slightly bigger pupil for a goofy stare
                    ctx.fillStyle = '#000000';
                    ctx.fill();

                    // Right Eye
                    let rightEyeX = renderX + Math.cos(angle + eyeOffsetAngle) * 10;
                    let rightEyeY = renderY + Math.sin(angle + eyeOffsetAngle) * 10;
                    ctx.beginPath();
                    ctx.arc(rightEyeX, rightEyeY, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.beginPath(); 
                    ctx.arc(rightEyeX, rightEyeY, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#000000';
                    ctx.fill();

                } else {
                    // Body segments
                    let bodyRadius = radius * (1 - index / (snake.length + 10));
                    ctx.arc(renderX, renderY, bodyRadius, 0, Math.PI * 2);
                    ctx.fillStyle = index % 2 === 0 ? '#81c784' : '#4caf50';
                    ctx.fill();
                }
            });

            // 2. Draw Food (Emoji or "67" text)
            ctx.save();
            ctx.translate(food.x, food.y);
            let currentScale = food.pulse;
            ctx.scale(currentScale, currentScale); 
            
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            if (food.type === '67') {
                // Glow effect specifically for "67"
                ctx.font = "bold 38px Impact, sans-serif";
                ctx.fillStyle = '#ffeb3b'; // Golden text
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffeb3b';
                ctx.fillText(food.type, 0, 0);
            } else {
                ctx.font = "34px serif";
                ctx.fillText(food.type, 0, 0); 
            }
            ctx.restore();

            // 3. Draw Game Over Menu
            if (isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ff2a74';
                ctx.font = 'bold 45px system-ui, -apple-system'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);

                ctx.fillStyle = '#ffffff';
                ctx.font = '16px system-ui, -apple-system'; 
                ctx.fillText('TAP SCREEN TO RESTART', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        function loop() {
            update(); 
            draw();
            requestAnimationFrame(loop);
        }

        // --- Controls: Keyboard Listener ---
        window.addEventListener('keydown', (e) => {
            // Resume audio context on user gesture (iOS/Safari rules)
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (isGameOver) {
                resetGame();
                return;
            }
            switch(e.key) {
                case 'ArrowUp':    targetAngle = -Math.PI / 2; break;
                case 'ArrowDown':  targetAngle = Math.PI / 2; break;
                case 'ArrowLeft':  targetAngle = Math.PI; break;
                case 'ArrowRight': targetAngle = 0; break;
            }
        });

        // --- Controls: Touch Listener ---
        let touchStartX = 0;
        let touchStartY = 0;

        window.addEventListener('touchstart', (e) => {
            // Resume audio context on user gesture (iOS/Safari rules)
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (isGameOver) {
                resetGame();
                return;
            }
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!touchStartX || !touchStartY || isGameOver) return;

            let touchEndX = e.touches[0].clientX;
            let touchEndY = e.touches[0].clientY;

            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;

            if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                targetAngle = Math.atan2(dy, dx); 
                touchStartX = touchEndX;
                touchStartY = touchEndY;
            }
        }, { passive: true });

        loop();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goofy 67 Snake - Audio Fixed</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle, #251c4a 0%, #0e091a 100%);
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            width: 95vw;
            max-width: 800px;
            aspect-ratio: 4 / 3; 
        }
        canvas {
            display: block;
            background: #110e1c;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 20px; 
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            pointer-events: none;
            font-family: monospace;
        }
        /* NEW: Start Menu Overlay Styles */
        #start-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(14, 9, 26, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #start-title {
            font-size: 45px;
            font-weight: 900;
            color: #ff2a74;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 42, 116, 0.5);
            text-align: center;
            font-family: Impact, sans-serif;
            letter-spacing: 2px;
        }
        #play-btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #110e1c;
            background: #ffea00;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 234, 0, 0.4);
            transition: transform 0.2s;
            font-family: system-ui, sans-serif;
        }
        #play-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-menu">
            <h1 id="start-title">GOOFY SNAKE 67<br><span style="color:#ffea00; font-size:24px;">MEME EDITION</span></h1>
            <button id="play-btn" onclick="startGame()">START GAME</button>
        </div>
        
        <div id="ui-layer">SCORE: <span id="score">000</span></div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startMenu = document.getElementById('start-menu');

        // --- Web Audio & Funny Voice Engine ---
        let audioCtx = null;
        let isGameStarted = false; // Controls if game is running

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // NEW: Goofy Meme Voice Text-To-Speech for "Sixty Seven"
        function speakSixtySeven() {
            if (!window.speechSynthesis) return;
            try {
                // Cancel any ongoing speech so it doesn't lag
                window.speechSynthesis.cancel();
                
                let utterance = new SpeechSynthesisUtterance("Sixty Seven!");
                utterance.lang = 'en-US'; 
                
                // CRITICAL HACK: Make it sound super funny, high-pitched like a minion / meme
                utterance.pitch = 2.0;  // Maximum funny high pitch
                utterance.rate = 1.4;   // Fast funny talking speed
                utterance.volume = 1.0; // Max volume
                
                window.speechSynthesis.speak(utterance);
            } catch (e) {}
        }

        function playEatSound(is67) {
            if (is67) {
                speakSixtySeven(); // Speak "Sixty Seven!" immediately
                return;
            }
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }

        function playGameOverSound() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } catch(e) {}
        }

        // NEW: Function triggered when clicking START GAME
        function startGame() {
            initAudio(); // Legally unlock browser audio
            isGameStarted = true;
            startMenu.style.display = 'none'; // Hide the menu
            // Play a funny entry audio hint
            if (window.speechSynthesis) {
                let welcome = new SpeechSynthesisUtterance("Let's go!");
                welcome.lang = 'en-US';
                welcome.pitch = 1.6;
                welcome.rate = 1.2;
                window.speechSynthesis.speak(welcome);
            }
        }

        // --- Core Variables ---
        let snake = [
            {x: 400, y: 300},
            {x: 385, y: 300},
            {x: 370, y: 300},
            {x: 355, y: 300}
        ];
        
        let radius = 12;       
        let speed = 6;         
        let angle = 0;         
        let targetAngle = 0;   
        let score = 0;
        let isGameOver = false; 
        let growPending = 0;   
        let waveTimer = 0; 
        let goofyMemeTimer = 0;    
        let memeTextTimer = 0;     
        let lastMemeMessage = "";   

        const memePhrases = [
            "BRUH!! 67!!!", 
            "WHAT THE 67?!!", 
            "OH MY GOD 67!!", 
            "67 IS SO GOOFY LMAO", 
            "SHEESH! 67 POWER!"
        ];

        let food = { x: 0, y: 0, radius: 16, pulse: 1, type: '🍎' };
        const foodPool = ['🍎', '🍌', '🍓', '🍕', '🍇', '🍔', '67'];

        function respawnFood() {
            food.x = Math.random() * (canvas.width - 100) + 50;
            food.y = Math.random() * (canvas.height - 100) + 50;
            food.type = foodPool[Math.floor(Math.random() * foodPool.length)];
            
            if (food.type === '67') {
                food.radius = 26; 
            } else {
                food.radius = 16;
            }
        }

        respawnFood();

        // --- Core Logic: Update ---
        function update() {
            if (!isGameStarted || isGameOver) return; // Wait for game start menu

            if (goofyMemeTimer > 0) goofyMemeTimer--;
            if (memeTextTimer > 0) memeTextTimer--;

            if (goofyMemeTimer > 0) {
                waveTimer += speed * 0.4; 
            } else {
                waveTimer += speed * 0.02; 
            }

            let angleDiff = targetAngle - angle;
            angleDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
            angle += angleDiff * 0.2; 

            let head = {
                x: snake[0].x + Math.cos(angle) * speed,
                y: snake[0].y + Math.sin(angle) * speed
            };

            if (head.x > canvas.width || head.x < 0 || head.y > canvas.height || head.y < 0) {
                isGameOver = true;
                playGameOverSound(); 
                return;
            }

            snake.unshift(head);

            let dx = head.x - food.x;
            let dy = head.y - food.y;
            let distance = Math.sqrt(dx * dx + dy * dy); 

            if (distance < radius + food.radius) {
                if (food.type === '67') {
                    score += 67; 
                    goofyMemeTimer = 90; 
                    memeTextTimer = 90;  
                    lastMemeMessage = memePhrases[Math.floor(Math.random() * memePhrases.length)];
                    playEatSound(true);  // Trigger English Meme Voice!
                } else {
                    score += 10;
                    playEatSound(false); 
                }
                scoreEl.innerText = score.toString().padStart(3, '0');
                respawnFood();
                speed += 0.15; 
                growPending += 3; 
            }

            if (growPending > 0) {
                growPending--; 
            } else {
                snake.pop(); 
            }

            for (let i = 15; i < snake.length; i++) {
                let sDx = head.x - snake[i].x;
                let sDy = head.y - snake[i].y;
                let sDist = Math.sqrt(sDx * sDx + sDy * sDy);
                if (sDist < radius * 0.8) {
                    isGameOver = true; 
                    playGameOverSound(); 
                    return;
                }
            }

            food.pulse = 1 + Math.sin(Date.now() * 0.005) * 0.15;
        }

        // --- Core Logic: Draw ---
        function draw() {
            ctx.fillStyle = '#110e1c'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Snake
            snake.forEach((segment, index) => {
                ctx.beginPath();
                
                let renderX = segment.x;
                let renderY = segment.y;

                if (goofyMemeTimer > 0) {
                    renderX += Math.sin(waveTimer + index * 0.8) * 12 * Math.sin(angle + Math.PI/2);
                    renderY += Math.cos(waveTimer + index * 0.8) * 12 * Math.cos(angle + Math.PI/2);
                }

                if (index === 0) {
                    ctx.arc(renderX, renderY, radius * 1.3, 0, Math.PI * 2); 
                    ctx.fillStyle = '#4caf50'; 
                    ctx.fill();

                    let eyeOffsetAngle = 0.5; 
                    let leftEyeX = renderX + Math.cos(angle - eyeOffsetAngle) * 10;
                    let leftEyeY = renderY + Math.sin(angle - eyeOffsetAngle) * 10;
                    ctx.beginPath();
                    ctx.arc(leftEyeX, leftEyeY, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.beginPath(); 
                    let pupilOffset = goofyMemeTimer > 0 ? 1 : 2.5;
                    ctx.arc(leftEyeX, leftEyeY, pupilOffset, 0, Math.PI * 2);
                    ctx.fillStyle = '#000000';
                    ctx.fill();

                    let rightEyeX = renderX + Math.cos(angle + eyeOffsetAngle) * 10;
                    let rightEyeY = renderY + Math.sin(angle + eyeOffsetAngle) * 10;
                    ctx.beginPath();
                    ctx.arc(rightEyeX, rightEyeY, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.beginPath(); 
                    ctx.arc(rightEyeX, rightEyeY, pupilOffset, 0, Math.PI * 2);
                    ctx.fillStyle = '#000000';
                    ctx.fill();
                } else {
                    let bodyRadius = radius * (1 - index / (snake.length + 10));
                    ctx.arc(renderX, renderY, bodyRadius, 0, Math.PI * 2);
                    ctx.fillStyle = index % 2 === 0 ? '#81c784' : '#4caf50';
                    ctx.fill();
                }
            });

            // 2. Draw Food 
            ctx.save();
            ctx.translate(food.x, food.y);
            let currentScale = food.pulse;
            ctx.scale(currentScale, currentScale); 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            if (food.type === '67') {
                ctx.font = "900 55px Impact, sans-serif"; 
                ctx.fillStyle = '#ffeb3b'; 
                ctx.shadowBlur = 25; 
                ctx.shadowColor = '#ffeb3b';
                ctx.fillText(food.type, 0, 0);
            } else {
                ctx.font = "34px serif";
                ctx.fillText(food.type, 0, 0); 
            }
            ctx.restore();

            // Flashing meme text on screen center
            if (memeTextTimer > 0) {
                ctx.save();
                ctx.fillStyle = memeTextTimer % 4 === 0 ? '#00e5ff' : '#ffea00'; 
                ctx.font = 'black 36px Impact, Arial Black, sans-serif';
                ctx.textAlign = 'center';
                let textShakeY = Math.sin(Date.now() * 0.05) * 4;
                ctx.fillText(lastMemeMessage, canvas.width / 2, 100 + textShakeY);
                ctx.restore();
            }

            // 3. Draw Game Over Menu
            if (isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ff2a74';
                ctx.font = 'bold 45px system-ui, -apple-system'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);

                ctx.fillStyle = '#ffffff';
                ctx.font = '16px system-ui, -apple-system'; 
                ctx.fillText('TAP SCREEN TO RESTART', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        function resetGame() {
            score = 0;
            speed = 6; 
            angle = 0;
            targetAngle = 0;
            isGameOver = false;
            growPending = 0; 
            waveTimer = 0;
            goofyMemeTimer = 0;
            memeTextTimer = 0;
            scoreEl.innerText = "000";
            snake = [
                {x: 400, y: 300},
                {x: 385, y: 300},
                {x: 370, y: 300},
                {x: 355, y: 300}
            ];
            respawnFood();
        }

        function loop() {
            update(); 
            draw();
            requestAnimationFrame(loop);
        }

        // --- Controls Controls Listener ---
        window.addEventListener('keydown', (e) => {
            initAudio(); 
            if (isGameOver) {
                resetGame();
                return;
            }
            switch(e.key) {
                case 'ArrowUp':    targetAngle = -Math.PI / 2; break;
                case 'ArrowDown':  targetAngle = Math.PI / 2; break;
                case 'ArrowLeft':  targetAngle = Math.PI; break;
                case 'ArrowRight': targetAngle = 0; break;
            }
        });

        let touchStartX = 0;
        let touchStartY = 0;

        window.addEventListener('touchstart', (e) => {
            initAudio(); 
            if (isGameOver) {
                resetGame();
                return;
            }
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!touchStartX || !touchStartY || isGameOver || !isGameStarted) return;

            let touchEndX = e.touches[0].clientX;
            let touchEndY = e.touches[0].clientY;

            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;

            if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                targetAngle = Math.atan2(dy, dx); 
                touchStartX = touchEndX;
                touchStartY = touchEndY;
            }
        }, { passive: true });

        loop();
    </script>
</body>
</html>

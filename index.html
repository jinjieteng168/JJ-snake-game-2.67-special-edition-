<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title> JJ 67 Snake Game </title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background: #06040a;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 画面撑满全屏，更高级、更大 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #090712;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* 高级半透明毛玻璃 UI */
        #ui-layer {
            position: absolute;
            top: 24px;
            left: 24px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.07);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            font-size: 14px; 
            font-weight: 900;
            letter-spacing: 1.5px;
            pointer-events: none;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }
        #speed-controller {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 6px;
            z-index: 10;
            padding: 5px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .speed-btn {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.6);
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.2s ease;
        }
        .speed-btn.active {
            background: #ffea00;
            color: #090712;
        }
        #start-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #06040a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        #play-btn {
            padding: 18px 56px;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #06040a;
            background: #ffea00;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(255, 234, 0, 0.4);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-menu">
            <button id="play-btn" onclick="startGame()">START GAME</button>
        </div>
        
        <div id="ui-layer">
            <div style="color: rgba(255,255,255,0.9); font-size: 16px;">SCORE: <span id="score" style="color: #fff; font-weight:900;">000</span></div>
            <div style="color: #ff2a74; font-size: 11px;">HIGHEST RECORD: <span id="high-score" style="font-weight:800;">000</span></div>
            <div id="food-counter" style="color: #00e5ff; font-size: 11px; font-weight:800;">EATEN: 0</div>
        </div>
        
        <div id="speed-controller">
            <button id="btn-low" class="speed-btn" onclick="changeSpeedSetting('LOW')">LOW</button>
            <button id="btn-med" class="speed-btn active" onclick="changeSpeedSetting('MED')">MED</button>
            <button id="btn-high" class="speed-btn" onclick="changeSpeedSetting('HIGH')">HIGH</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const foodCounterEl = document.getElementById('food-counter');
        const startMenu = document.getElementById('start-menu');

        // 动态调整 Canvas 尺寸为全屏
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let audioCtx = null;
        let isGameStarted = false; 

        const SPEED_MODIFIERS = { 'LOW': 5, 'MED': 7.5, 'HIGH': 10.5 };
        let currentSpeedSetting = 'MED';

        let currentSkin = 'CLASSIC';
        let totalFoodEatenThisSession = 0; 

        let savedHighScore = localStorage.getItem('snake_67_high') || 0;
        highScoreEl.innerText = savedHighScore.toString().padStart(3, '0');

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playCrazy67Sound() {
            if (!audioCtx) return;
            try {
                let now = audioCtx.currentTime;
                let osc1 = audioCtx.createOscillator();
                let osc2 = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
                osc1.type = 'sawtooth'; osc2.type = 'square';   
                osc1.frequency.setValueAtTime(100, now);
                osc1.frequency.linearRampToValueAtTime(1500, now + 0.1);
                osc1.frequency.linearRampToValueAtTime(300, now + 0.3);
                osc2.frequency.setValueAtTime(300, now);
                osc2.frequency.linearRampToValueAtTime(1800, now + 0.15);
                osc2.frequency.linearRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.4, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc1.start(now); osc2.start(now); osc1.stop(now + 0.3); osc2.stop(now + 0.3);
            } catch(e) {}
        }

        function playEatSound() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } catch(e) {}
        }

        function playGameOverSound() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } catch(e) {}
        }

        function startGame() {
            initAudio(); 
            isGameStarted = true;
            startMenu.style.display = 'none'; 
            resetGame();
        }

        function changeSpeedSetting(newSetting) {
            currentSpeedSetting = newSetting;
            speed = SPEED_MODIFIERS[newSetting];
            document.querySelectorAll('.speed-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${newSetting.toLowerCase()}`).classList.add('active');
        }

        function updateSkinUnlocks() {
            foodCounterEl.innerText = `EATEN: ${totalFoodEatenThisSession}`;
            if (totalFoodEatenThisSession >= 16) {
                currentSkin = 'GOLD'; 
            } else if (totalFoodEatenThisSession >= 8) {
                currentSkin = 'BLUE'; 
            } else {
                currentSkin = 'CLASSIC'; 
            }
        }

        // --- 核心变量 ---
        let snake = [];
        let radius = 14; // 蛇身稍微放大，大屏更清晰      
        let speed = SPEED_MODIFIERS['MED'];         
        let angle = 0;         
        let targetAngle = 0;   
        let score = 0;
        let isGameOver = false; 
        let growPending = 0;   
        let waveTimer = 0; 
        let goofyMemeTimer = 0;    
        let memeTextTimer = 0;     
        let lastMemeMessage = "";   
        let consecutiveNon67Count = 0; 

        const memePhrases = ["BRUH!! 67!!!", "WHAT THE 67?!!", "OH MY GOD 67!!", "67 IS SO GOOFY LMAO", "SHEESH! 67 POWER!"];
        let food = { x: 0, y: 0, radius: 18, pulse: 1, rot: 0, type: '🍎' };
        const fruits = ['🍎', '🍌', '🍓', '🍩', '🍕', '🍇', '🍉', '🥑', '🍔', '🍟'];

        // 核心安全优化：绝对不让食物刷新在左上角/右上角的 UI 后面
        function respawnFood() {
            let valid = false;
            let rx, ry, rRad;

            let dynamicChance = 0.20; 
            if (consecutiveNon67Count > 4) dynamicChance = 0.50; 
            if (consecutiveNon67Count === 0) dynamicChance = 0.05; 

            if (Math.random() < dynamicChance) {
                food.type = '67';
                rRad = 35; // 狂暴大 67 尺寸
                consecutiveNon67Count = 0; 
            } else {
                food.type = fruits[Math.floor(Math.random() * fruits.length)];
                rRad = 18;
                consecutiveNon67Count++;
            }

            while(!valid) {
                rx = Math.random() * (canvas.width - 120) + 60;
                ry = Math.random() * (canvas.height - 120) + 60;

                // 避开左上角 UI 区域 (x < 250, y < 140)
                if (rx < 250 && ry < 140) continue;
                // 避开右上角 按钮 区域 (x > canvas.width - 250, y < 100)
                if (rx > canvas.width - 250 && ry < 100) continue;

                valid = true;
            }

            food.x = rx;
            food.y = ry;
            food.radius = rRad;
            food.rot = Math.random() * Math.PI * 2;
        }

        function update() {
            if (!isGameStarted || isGameOver) return; 

            if (goofyMemeTimer > 0) goofyMemeTimer--;
            if (memeTextTimer > 0) memeTextTimer--;

            if (goofyMemeTimer > 0) {
                waveTimer += speed * 0.45; 
            } else {
                waveTimer += speed * 0.02; 
            }

            // 67 自己的魔性自体旋转和缩放运动计算
            food.rot += 0.08; 

            let angleDiff = targetAngle - angle;
            angleDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
            angle += angleDiff * 0.25; 

            let head = {
                x: snake[0].x + Math.cos(angle) * speed,
                y: snake[0].y + Math.sin(angle) * speed
            };

            // 触碰全屏边界判死
            if (head.x > canvas.width || head.x < 0 || head.y > canvas.height || head.y < 0) {
                isGameOver = true;
                playGameOverSound(); 
                return;
            }

            snake.unshift(head);

            let dx = head.x - food.x;
            let dy = head.y - food.y;
            let distance = Math.sqrt(dx * dx + dy * dy); 

            if (distance < radius + food.radius) {
                totalFoodEatenThisSession++; 
                updateSkinUnlocks();

                if (food.type === '67') {
                    score += 67; 
                    goofyMemeTimer = 90; 
                    memeTextTimer = 90;  
                    lastMemeMessage = memePhrases[Math.floor(Math.random() * memePhrases.length)];
                    playCrazy67Sound();  
                } else {
                    score += 10;
                    playEatSound(); 
                }
                
                scoreEl.innerText = score.toString().padStart(3, '0');

                if (score > savedHighScore) {
                    savedHighScore = score;
                    localStorage.setItem('snake_67_high', savedHighScore);
                    highScoreEl.innerText = savedHighScore.toString().padStart(3, '0');
                }

                respawnFood();
                speed += 0.15; 
                growPending += 4; 
            }

            if (growPending > 0) { growPending--; } else { snake.pop(); }

            for (let i = 15; i < snake.length; i++) {
                let sDx = head.x - snake[i].x;
                let sDy = head.y - snake[i].y;
                let sDist = Math.sqrt(sDx * sDx + sDy * sDy);
                if (sDist < radius * 0.8) {
                    isGameOver = true; 
                    playGameOverSound(); 
                    return;
                }
            }

            // 灵魂律动：如果是67，放大缩小的律动感强2倍！
            if(food.type === '67') {
                food.pulse = 1 + Math.sin(Date.now() * 0.015) * 0.25;
            } else {
                food.pulse = 1 + Math.sin(Date.now() * 0.005) * 0.15;
            }
        }

        function draw() {
            // 彻底解决变黑：不使用任何 shadow 滤镜，直接进行最高画质的全屏高频 HSL 色彩风暴
            if (goofyMemeTimer > 0) {
                let hue = (Date.now() * 0.5) % 360;
                ctx.fillStyle = `hsla(${hue}, 90%, 15%, 1)`;
            } else {
                ctx.fillStyle = '#0a0816'; 
            }
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. 绘制蛇身
            snake.forEach((segment, index) => {
                ctx.beginPath();
                let renderX = segment.x;
                let renderY = segment.y;

                if (goofyMemeTimer > 0) {
                    renderX += Math.sin(waveTimer + index * 0.8) * 16 * Math.sin(angle + Math.PI/2);
                    renderY += Math.cos(waveTimer + index * 0.8) * 16 * Math.cos(angle + Math.PI/2);
                }

                if (index === 0) {
                    ctx.arc(renderX, renderY, radius * 1.3, 0, Math.PI * 2); 
                    
                    if (currentSkin === 'BLUE') ctx.fillStyle = '#00e5ff';
                    else if (currentSkin === 'GOLD') ctx.fillStyle = '#ffea00';
                    else ctx.fillStyle = '#00ff66'; 
                    
                    ctx.fill();

                    // 眼睛
                    let eyeOffsetAngle = 0.5; 
                    let leftEyeX = renderX + Math.cos(angle - eyeOffsetAngle) * 11;
                    let leftEyeY = renderY + Math.sin(angle - eyeOffsetAngle) * 11;
                    ctx.beginPath(); ctx.arc(leftEyeX, leftEyeY, 5.5, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
                    ctx.beginPath(); 
                    let pupilOffset = goofyMemeTimer > 0 ? 1 : 2.5;
                    ctx.arc(leftEyeX, leftEyeY, pupilOffset, 0, Math.PI * 2); ctx.fillStyle = '#000000'; ctx.fill();

                    let rightEyeX = renderX + Math.cos(angle + eyeOffsetAngle) * 11;
                    let rightEyeY = renderY + Math.sin(angle + eyeOffsetAngle) * 11;
                    ctx.beginPath(); ctx.arc(rightEyeX, rightEyeY, 5.5, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
                    ctx.beginPath(); ctx.arc(rightEyeX, rightEyeY, pupilOffset, 0, Math.PI * 2); ctx.fillStyle = '#000000'; ctx.fill();
                } else {
                    let bodyRadius = radius * (1 - index / (snake.length + 15));
                    if(bodyRadius < 4) bodyRadius = 4;
                    ctx.arc(renderX, renderY, bodyRadius, 0, Math.PI * 2);
                    
                    if (currentSkin === 'BLUE') {
                        ctx.fillStyle = index % 2 === 0 ? '#00b0ff' : '#0077ff';
                    } else if (currentSkin === 'GOLD') {
                        ctx.fillStyle = index % 2 === 0 ? '#ffd700' : '#ff9100';
                    } else {
                        ctx.fillStyle = index % 2 === 0 ? '#00cc55' : '#00aa44'; 
                    }
                    ctx.fill();
                }
            });

            // 2. 绘制食物（找回魔性灵魂：让 67 旋转跳跃闭着眼！）
            ctx.save();
            ctx.translate(food.x, food.y);
            ctx.scale(food.pulse, food.pulse); 
            
            if (food.type === '67') {
                ctx.rotate(food.rot); // 注入狂放旋转灵魂
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "900 75px Impact, Arial Black, sans-serif"; 
                ctx.fillStyle = '#ffea00'; 
                ctx.fillText(food.type, 0, 0);
            } else {
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "42px serif";
                ctx.fillText(food.type, 0, 0); 
            }
            ctx.restore();

            // 魔性恶搞字眼
            if (memeTextTimer > 0) {
                ctx.save();
                ctx.fillStyle = memeTextTimer % 4 === 0 ? '#00ffff' : '#ff0055'; 
                ctx.font = '900 46px Impact, Arial Black, sans-serif';
                ctx.textAlign = 'center';
                let textShakeY = Math.sin(Date.now() * 0.08) * 8;
                ctx.fillText(lastMemeMessage, canvas.width / 2, canvas.height / 3 + textShakeY);
                ctx.restore();
            }

            // 死亡结算
            if (isGameOver) {
                ctx.fillStyle = 'rgba(5, 3, 10, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff0055';
                ctx.font = '900 55px system-ui, sans-serif'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 25);

                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.font = '600 16px monospace'; 
                ctx.fillText('TAP SCREEN TO RESTART', canvas.width / 2, canvas.height / 2 + 50);
            }
        }

        function resetGame() {
            score = 0; 
            totalFoodEatenThisSession = 0;
            currentSkin = 'CLASSIC';
            if(foodCounterEl) foodCounterEl.innerText = "EATEN: 0";

            speed = SPEED_MODIFIERS[currentSpeedSetting]; 
            angle = 0; targetAngle = 0; isGameOver = false; growPending = 0; waveTimer = 0; goofyMemeTimer = 0; memeTextTimer = 0;
            if(scoreEl) scoreEl.innerText = "000";
            
            // 初始化蛇的位置在屏幕中央
            let cx = canvas.width / 2;
            let cy = canvas.height / 2;
            snake = [{x: cx, y: cy}, {x: cx-15, y: cy}, {x: cx-30, y: cy}, {x: cx-45, y: cy}];
            respawnFood();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }

        // 键盘监听
        window.addEventListener('keydown', (e) => {
            initAudio(); 
            if (isGameOver) { resetGame(); return; }
            switch(e.key) {
                case 'ArrowUp':    targetAngle = -Math.PI / 2; break;
                case 'ArrowDown':  targetAngle = Math.PI / 2; break;
                case 'ArrowLeft':  targetAngle = Math.PI; break;
                case 'ArrowRight': targetAngle = 0; break;
            }
        });

        // 完美适配 iPad/手机全屏滑动的触控监听
        let touchStartX = 0; let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            initAudio(); 
            if (isGameOver) { resetGame(); return; }
            touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!touchStartX || !touchStartY || isGameOver || !isGameStarted) return;
            let touchEndX = e.touches[0].clientX; let touchEndY = e.touches[0].clientY;
            let dx = touchEndX - touchStartX; let dy = touchEndY - touchStartY;
            if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                targetAngle = Math.atan2(dy, dx); touchStartX = touchEndX; touchStartY = touchEndY;
            }
        }, { passive: true });

        loop();
    </script>
</body>
</html>
